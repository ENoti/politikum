name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
      - "hotfix/**"
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend build
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Java version
        run: java -version

      - name: Build backend
        run: |
          cd politikum-main-backend
          mvn -DskipTests clean package

  frontend:
    name: Frontend build
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Node version
        run: |
          node -v
          npm -v

      - name: Install frontend dependencies
        run: |
          cd politikum-main-frontend
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build frontend
        run: |
          cd politikum-main-frontend
          npm run build
