name: Deploy production

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64]
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show commit
        run: |
          echo "Deploying commit: $GITHUB_SHA"

      - name: Build backend
        run: |
          cd politikum-main-backend
          mvn -DskipTests clean package

      - name: Build frontend
        run: |
          cd politikum-main-frontend
          npm ci
          npm run build

      - name: Install backend artifact
        run: |
          mkdir -p /opt/politikum/politikum-main-backend/target
          cp politikum-main-backend/target/backend.jar /opt/politikum/politikum-main-backend/target/backend.jar

      - name: Install frontend build
        run: |
          mkdir -p /opt/politikum/politikum-main-frontend/dist
          rsync -a --delete politikum-main-frontend/dist/ /opt/politikum/politikum-main-frontend/dist/

      - name: Restart services
        run: |
          systemctl restart politikum-backend
          systemctl reload nginx

      - name: Verify services
        run: |
          systemctl is-active politikum-backend
          systemctl is-active nginx
